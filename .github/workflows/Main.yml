name: Generate Snake

on:
  schedule:
    # Runs every 6 hours
    - cron: "0 */6 * * *"
  
  # Allows manual triggers from the Actions tab
  workflow_dispatch:
  
  # Also runs on every push to the main branch
  push:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    # Added a timeout to prevent infinite loops if something hangs
    timeout-minutes: 5

    steps:
      # Fix 1: Updated to v4 (uses Node 20+)
      - uses: actions/checkout@v4

      # Fix 2: Updated Snake generator to v3
      - name: generate-snake-game-from-github-contribution-grid
        uses: Platane/snk@v3
        with:
          # This automatically detects your username
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Fix 3: Simplified Deployment
      # This removes the need for 'ad-m/github-push-action' and handles 
      # the 'output' branch much more reliably.
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
